# Deep Research Pro v5.0 — 全局配置
# 核心升级：多层数据源直接访问 + 反直觉洞察生产 + 信息茧房检测

# =============================================================================
# 搜索配置
# =============================================================================
search:
  layers:
    - name: background
      description: "背景层：建立基础认知"
    - name: authority
      description: "权威层：获取权威信源"
    - name: timeliness
      description: "时效层：获取最新动态"
    - name: academic
      description: "学术层：获取学术/研究信源"
    - name: regulatory
      description: "监管层：监管申报文件、政策法规"
    - name: weak_signal
      description: "弱信号层：专利/招聘/采购/学术热度趋势"
  max_retries: 2

  # 搜索引擎 3 级降级链（Google CSE 已弃用，Bing 已取消）
  providers:
    web:
      chain: [tavily, brave, duckduckgo]
      tavily:
        search_depth: basic         # basic=1 credit, advanced=2 credits
        topic: general              # general | news | finance
      brave:
        count: 10
      duckduckgo:
        max_results: 10
        region: "wt-wt"             # 全球搜索
    finance:
      primary: tencent
      fallback: tushare
    academic:
      providers: [arxiv, semantic_scholar, pubmed]
      arxiv:
        max_results_per_query: 10
        rate_limit_seconds: 3
      semantic_scholar:
        max_results_per_query: 10
        rate_limit: "100/5min"      # 免费无 Key 模式
      pubmed:
        max_results_per_query: 10
        use_api_key: true

# =============================================================================
# 信源权重（新增 T0 层级）
# =============================================================================
source_weights:
  0:
    label: "零级原始数据"
    weight: 1.2
    description: "政府原始数据、监管申报文件、国际组织统计数据"
    skip_craap: true                # T0 跳过 CRAAP 评估
  1:
    label: "一级权威"
    weight: 1.0
    description: "政府机构、顶级学术期刊、国际标准组织"
  2:
    label: "二级专业"
    weight: 0.8
    description: "顶级咨询公司、行业分析机构、专业媒体"
  3:
    label: "三级新闻"
    weight: 0.6
    description: "主流新闻媒体、知名科技媒体"
  4:
    label: "四级一般"
    weight: 0.4
    description: "一般网站、企业官网、行业博客"
  5:
    label: "五级社交"
    weight: 0.15
    description: "社交媒体、论坛、自媒体、微信公众号"

# =============================================================================
# CRAAP 评估配置
# =============================================================================
evaluation:
  craap_threshold: 5.5
  max_sources_to_evaluate: 30
  craap_weights:
    currency: 0.2
    relevance: 0.2
    authority: 0.2
    accuracy: 0.2
    purpose: 0.2
  # v5.0: T0 信源跳过 CRAAP，其他信源使用全文评估
  use_full_content: true            # 使用全文替代 snippet 进行评估

# =============================================================================
# 全文获取配置
# =============================================================================
full_content:
  max_sources: 20                   # Top 20 信源获取全文
  max_chars_per_source: 3000        # 每篇限制 3000 字
  max_workers: 5                    # 并行获取线程数
  timeout_seconds: 15               # 单篇超时
  respect_robots_txt: true
  output_dir: "sources/full_content"

# =============================================================================
# 质量门控
# =============================================================================
quality_gates:
  sources:
    min_total_sources: 10
    min_tier0_sources: 0            # T0 不强制（非所有主题有政府数据）
    min_tier1_sources: 1
    min_tier2_sources: 2
    min_avg_craap: 5.5
    min_verified_points: 2
    hard_min_total_sources: 5
    hard_min_avg_craap: 4.0
    adaptive_threshold: true
    adaptive_reduction: 0.3

  # v5.0 新增：多样性门控
  diversity:
    min_language_entropy: 0.3
    min_type_entropy: 0.5
    max_sentiment_skew: 0.7
    min_geo_entropy: 0.3
    min_counterintuitive_findings: 1

  report:
    min_char_count: 3000
    hard_min_char_count: 500
    required_sections:
      - "执行摘要"
      - "研究方法"
      - "局限"
      - "参考文献"
      - "人工验证清单"           # v5.0 新增
    must_have_tables: true
    no_markdown_tables: true
    min_data_table_density: 0.001   # 每 1000 字至少 1 个数据表格

# =============================================================================
# 政府/国际组织数据源配置
# =============================================================================
gov_data:
  worldbank:
    base_url: "https://api.worldbank.org/v2/"
    default_format: "json"
    timeout: 30
  imf:
    base_url: "https://www.imf.org/external/datamapper/api/"
    timeout: 30
  fred:
    base_url: "https://api.stlouisfed.org/fred/"
    timeout: 30
    # Key 从环境变量 FRED_API_KEY 读取
  china_stats:
    base_url: "https://data.stats.gov.cn/"
    timeout: 30
  oecd:
    base_url: "https://stats.oecd.org/SDMX-JSON/"
    timeout: 30
  eurostat:
    base_url: "https://ec.europa.eu/eurostat/api/"
    timeout: 30
  clinical_trials:
    base_url: "https://clinicaltrials.gov/api/v2/"
    timeout: 30
  epa:
    base_url: "https://frs.epa.gov/api/"
    timeout: 30
  data_gov:
    base_url: "https://catalog.data.gov/api/"
    timeout: 30
  un_comtrade:
    base_url: "https://comtradeapi.un.org/"
    timeout: 30

# =============================================================================
# 监管申报数据源配置
# =============================================================================
regulatory:
  sec_edgar:
    search_url: "https://efts.sec.gov/LATEST/search-index"
    filings_url: "https://www.sec.gov/cgi-bin/browse-edgar"
    xbrl_url: "https://data.sec.gov/api/xbrl/"
    rate_limit: 10                  # 10 请求/秒
    # User-Agent 从环境变量 SEC_EDGAR_USER_AGENT 读取
  cninfo:
    base_url: "http://www.cninfo.com.cn/api/"
    timeout: 30
  hkex:
    base_url: "https://www1.hkexnews.hk/"
    timeout: 30
  edinet:
    base_url: "https://disclosure.edinet-fsa.go.jp/api/"
    timeout: 30

# =============================================================================
# 弱信号采集配置
# =============================================================================
weak_signals:
  patents:
    patentsview_url: "https://api.patentsview.org/patents/query"
    google_patents_url: "https://patents.google.com/"
    timeout: 30
  hiring:
    # 通过搜索引擎 site:linkedin.com/jobs 查询
    use_search_engine: true
  procurement:
    china_gov_url: "http://www.ccgp.gov.cn/"
    timeout: 30
  academic_trend:
    # 通过 arXiv + Semantic Scholar API 按月统计
    trend_months: 24

# =============================================================================
# 渲染配置
# =============================================================================
rendering:
  pdf:
    page_size: "A4"
    margin: "25mm"
  docx:
    default_font: "Arial"
    default_font_cjk: "微软雅黑"
    font_size: 11
    line_spacing: 1.6
    heading_color: "1a365d"
    accent_color: "2b6cb0"
  interactive_html:
    chart_library: "chart.js"       # CDN 加载
    theme_toggle: true              # 暗色/亮色切换
    collapsible_sections: true
    toc_navigation: true
    responsive: true
