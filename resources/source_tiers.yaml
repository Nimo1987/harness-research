# 信源域名分级数据库
# tier 0 = 零级原始数据 (v5.0 新增), tier 1 = 最权威, tier 5 = 最低可信度
# 匹配规则：域名或完整 URL 包含以下关键词即归入对应层级
# 按顺序匹配 tier_0 → tier_1 → tier_2 → tier_3 → tier_5，首次命中即停止
# 未命中任何规则的域名默认归入 tier_4（一般信源）
# T0 信源跳过 CRAAP 评估（政府原始数据无需评估权威性）

# ===========================================================================
# TIER 0 — 零级原始数据（weight: 1.2）v5.0 新增
# 政府/国际组织原始统计数据 API、监管申报文件系统
# 这些数据源返回的是未经加工的原始数据，无需 CRAAP 评估
# ===========================================================================
tier_0_raw_data:

  # ─── 国际组织原始数据 API ───
  - "api.worldbank.org"            # 世界银行 Open Data API
  - "data.imf.org"                 # IMF 数据 API
  - "fred.stlouisfed.org"          # 美联储 FRED 数据
  - "api.stlouisfed.org"           # FRED API 端点
  - "comtradeapi.un.org"           # UN Comtrade 贸易数据 API
  - "ec.europa.eu/eurostat"        # Eurostat 欧盟统计数据 API
  - "stats.oecd.org"               # OECD 统计数据 API

  # ─── 政府原始统计数据 ───
  - "data.stats.gov.cn"            # 中国国家统计局数据 API
  - "catalog.data.gov"             # 美国政府开放数据 CKAN API

  # ─── 监管申报文件系统 ───
  - "efts.sec.gov"                 # SEC EDGAR 全文搜索系统
  - "data.sec.gov"                 # SEC XBRL 结构化数据
  - "www.sec.gov/cgi-bin"          # SEC EDGAR 文件浏览

  # ─── 科学/医疗原始数据 ───
  - "clinicaltrials.gov"           # 临床试验原始数据
  - "frs.epa.gov"                  # EPA 环境数据系统

  # ─── 专利原始数据 ───
  - "api.patentsview.org"          # USPTO 专利数据 API


